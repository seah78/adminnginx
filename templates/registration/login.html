{% extends "dashboard/base.html" %}

{% block title %}Connexion | Admin Nginx{% endblock %}

{% block content %}
<section class="card login-card">
  <h1 class="page-title">Connexion</h1>
  <p class="muted">Connecte-toi pour accéder au dashboard.</p>

  {% if form.errors %}
    <p class="badge badge-red">Identifiants incorrects.</p>
  {% endif %}

  <form method="post" class="form">
    {% csrf_token %}

    <div class="form-group">
      <label for="{{ form.username.id_for_label }}">Utilisateur</label>
      {{ form.username }}
    </div>

    <div class="form-group">
      <label for="{{ form.password.id_for_label }}">Mot de passe</label>
      {{ form.password }}
    </div>

    <button class="button" type="submit">Se connecter</button>
  </form>
</section>
{% endblock %}
