{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% block title %}Admin Nginx{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">Admin Nginx</div>
        <div class="brand-subtitle">Reverse proxy control panel</div>
      </div>

      <nav class="nav">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'site_list' %}">Sites</a>
        <a href="{% url 'site_create' %}">Nouveau site</a>
        <a href="{% url 'diagnostics' %}">Diagnostics</a>
      </nav>
    </aside>

    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="{% static 'dashboard/js/main.js' %}"></script>
</body>
</html>
